<section id="servicios">

<section id="contacto">
    <h2>Solicita tu Presupuesto</h2>
    <p>Completa el formulario y nos pondremos en contacto para brindarte un presupuesto sin compromiso</p>
    
    <form class="form-contacto" action="https://formspree.io/f/myklnkgn" method="POST">
        <div class="form-group">
            <label for="nombre">Nombre:</label>
            <input type="text" id="nombre" name="nombre" required>
        </div>
        
        <div class="form-group">
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>
        </div>
        
        <div class="form-group">
            <label for="telefono">Teléfono:</label>
            <input type="tel" id="telefono" name="telefono" required>
        </div>
        
        <div class="form-group">
            <label for="trabajo">Descripción del trabajo:</label>
            <textarea id="trabajo" name="trabajo" rows="6" required></textarea>
        </div>
        
        <button type="submit" class="btn-enviar">Enviar Solicitud</button>
    </form>
</section>
